        <!-- OPEN ICON + ARROW + TITLE AND DESCRIPTION-->

                    <span class="close" onclick="closeLightbox()">&times;</span>
                    <span class="arrow left" onclick="changeImage(-1)">&#10094;</span>
                    <span class="arrow right" onclick="changeImage(1)">&#10095;</span>
                    <div class="lightbox-content">
                        <div class="media-container">
                            <img id="lightbox-img" class="hidden" src="" alt="">
                            <video id="lightbox-video" class="hidden" controls>
                                <source id="video-source" src="" type="video/mp4">
                                Your browser does not support the video tag.
                            </video>
                        </div>

        <div id="read-more">
            <a href="archive.html">CLICK TO SEE MORE!</a>
        </div>
    <script>
        // 1. THIS UNLOCKS THE PAGE AND ALLOWS SCROLLING
        window.addEventListener('load', function() {
            const loader = document.getElementById('page-loader');
            const content = document.getElementById('content');
            if (loader) loader.style.opacity = '0'; 
            setTimeout(() => {
                if (loader) loader.style.display = 'none'; 
                if (content) content.style.display = 'block'; 
            }, 500); 
        });

        // 2. READ MORE LOGIC
        window.addEventListener('scroll', () => {
            const readMore = document.getElementById('read-more');
            if (readMore && (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 50) {
                readMore.style.display = 'block';
            }
        });
    </script>
 
    <div id="timer" style="position: fixed; top: 0; right: 0; padding: 10px; background: transparent; color: #939393; font-size: 12px; z-index: 9999;" > </div>
    <div id=click-counter style=position:fixed;top:0;right:-15px;padding:25px;background-color:transparent;color:#939393;font-size:12px;z-index:9999>You clicked 0 times.</div>
